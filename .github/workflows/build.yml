name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build backend (PyInstaller)
        run: npm run build:backend

      - name: Verify backend build
        run: |
          echo "=== Checking dist-backend directory ==="
          ls -la dist-backend/ || (echo "ERROR: dist-backend directory not found!" && exit 1)
          echo "=== Backend file info ==="
          file dist-backend/bookweaver-backend || (echo "ERROR: Backend file not found!" && exit 1)
          echo "=== Backend file size ==="
          du -h dist-backend/bookweaver-backend
          echo "=== Testing backend executable ==="
          ./dist-backend/bookweaver-backend --help || echo "Warning: Backend --help failed, but continuing..."

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Electron app (no publish)
        run: npm run package:mac -- --publish never

      - name: Verify final package
        run: |
          echo "=== Checking release directory ==="
          ls -la release/ || (echo "ERROR: release directory not found!" && exit 1)
          echo "=== DMG file size ==="
          du -h release/*.dmg
          echo "=== Checking app bundle structure ==="
          ls -la release/mac-arm64/BookWeaver.app/Contents/ || (echo "ERROR: App bundle structure invalid!" && exit 1)
          echo "=== Checking backend in resources ==="
          ls -la release/mac-arm64/BookWeaver.app/Contents/resources/backend/ || (echo "ERROR: Backend not found in resources!" && exit 1)
          echo "=== Backend file in app ==="
          file release/mac-arm64/BookWeaver.app/Contents/resources/backend/bookweaver-backend || (echo "ERROR: Backend file not found!" && exit 1)
          du -h release/mac-arm64/BookWeaver.app/Contents/resources/backend/bookweaver-backend

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookWeaver-mac
          path: release/*.dmg
          retention-days: 7

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build backend (PyInstaller)
        run: npm run build:backend

      - name: Verify backend build
        shell: bash
        run: |
          echo "=== Checking dist-backend directory ==="
          ls -la dist-backend/ || (echo "ERROR: dist-backend directory not found!" && exit 1)
          echo "=== Backend file info ==="
          file dist-backend/bookweaver-backend.exe || (echo "ERROR: Backend file not found!" && exit 1)
          echo "=== Backend file size ==="
          du -h dist-backend/bookweaver-backend.exe

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Electron app (no publish)
        run: npm run package:win -- --publish never

      - name: Verify final package
        shell: bash
        run: |
          echo "=== Checking release directory ==="
          ls -la release/ || (echo "ERROR: release directory not found!" && exit 1)
          echo "=== EXE file size ==="
          du -h release/*.exe
          echo "=== Checking backend in resources ==="
          ls -la release/win-unpacked/resources/backend/ || ls -la release/windows-arm64/resources/backend/ || (echo "ERROR: Backend not found in resources!" && exit 1)
          echo "=== Backend file in app ==="
          file release/win-unpacked/resources/backend/bookweaver-backend.exe || file release/windows-arm64/resources/backend/bookweaver-backend.exe || (echo "ERROR: Backend file not found!" && exit 1)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookWeaver-win
          path: release/*.exe
          retention-days: 7

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: BookWeaver-mac
          path: release-mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: BookWeaver-win
          path: release-win

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-mac/*
            release-win/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}