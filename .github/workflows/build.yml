name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build frontend and Electron
        run: npm run build:frontend

      - name: Prepare Python embed package
        run: |
          mkdir -p python-embed/lib
          pip install -r backend/requirements.txt --target ./python-embed/lib/python3.11/site-packages
          echo '#!/bin/bash
          exec python3 "$@"' > python-embed/python3
          chmod +x python-embed/python3

      - name: Build Electron app (no publish)
        run: npm run package:mac -- --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookWeaver-mac
          path: release/*.dmg
          retention-days: 7

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        run: npm ci

      - name: Download Python embeddable package
        run: |
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.11.8/python-3.11.8-embed-amd64.zip" -OutFile "python-embed.zip"
          Expand-Archive python-embed.zip -DestinationPath python-embed
        shell: powershell

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt --target ./python-embed/Lib/site-packages

      - name: Build frontend and Electron
        run: npm run build:frontend

      - name: Build Electron app (no publish)
        run: npm run package:win -- --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookWeaver-win
          path: release/*.exe
          retention-days: 7

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: BookWeaver-mac
          path: release-mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: BookWeaver-win
          path: release-win

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-mac/*
            release-win/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}